<VirtualHost *:80>
    ServerName localhost
    ServerAdmin warnock@awcubed.com

    ErrorLog ${APACHE_LOG_DIR}/ihwapp-error.log
    CustomLog ${APACHE_LOG_DIR}/ihwapp-access.log combined

    RedirectMatch 302 ^/$ /ihwapp/
    Alias /ihwapp/static/ /var/www/ihwapp/IHWApp/staticfiles/

    <Directory /var/www/ihwapp/IHWApp/staticfiles>
        Require all granted
    </Directory>

    <Directory /var/www/ihwapp/IHWApp/IHWApp>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    WSGIDaemonProcess ihwapp \
        display-name=%{GROUP} \
        python-home=/var/www/ihwapp/venv \
        python-path=/var/www/ihwapp/IHWApp
    WSGIProcessGroup ihwapp
    WSGIScriptAlias /ihwapp /var/www/ihwapp/IHWApp/IHWApp/wsgi.py
</VirtualHost>
